<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1280px; height: 640px; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(168,85,247,0.35), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(99,102,241,0.28), transparent 60%),
      linear-gradient(135deg, #0f0b1e 0%, #1a1030 60%, #0b0817 100%);
    color: #f5f3ff;
    padding: 80px 100px;
    position: relative;
  }
  .logo-row { display: flex; align-items: center; gap: 28px; margin-bottom: 44px; }
  .eye {
    width: 88px; height: 88px;
    border-radius: 20px;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 40px rgba(168, 85, 247, 0.4);
  }
  .eye svg { width: 52px; height: 52px; color: #fff; }
  .wordmark {
    font-size: 76px;
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
    color: #fff;
  }
  .wordmark .accent { color: #c084fc; }
  .tagline {
    font-size: 36px;
    font-weight: 500;
    line-height: 1.25;
    color: #e9e5ff;
    max-width: 900px;
    letter-spacing: -0.5px;
    margin-bottom: 52px;
  }
  .code {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 24px 32px;
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 24px;
    color: #e9d5ff;
    max-width: 760px;
  }
  .code .kw { color: #a78bfa; }
  .code .str { color: #fbbf24; }
  .footer {
    position: absolute;
    bottom: 56px;
    left: 100px;
    right: 100px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 22px;
    color: #c4b5fd;
    letter-spacing: 0.3px;
  }
  .footer .badges {
    display: flex;
    gap: 18px;
    font-size: 18px;
    color: #a78bfa;
  }
  .badge { padding: 6px 14px; border: 1px solid rgba(196,181,253,0.3); border-radius: 999px; }
</style>
</head>
<body>
  <div class="logo-row">
    <div class="eye">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </div>
    <div class="wordmark">a11y<span class="accent">scout</span></div>
  </div>
  <div class="tagline">WCAG 2.1 A/AA accessibility audits for pull requests.</div>
  <div class="code">
    <span class="kw">uses:</span> <span class="str">jpatel3/a11yscout@v1</span>
  </div>
  <div class="footer">
    <div>github.com/marketplace/actions/a11yscout</div>
    <div class="badges">
      <span class="badge">MIT</span>
      <span class="badge">Free</span>
      <span class="badge">axe-core</span>
    </div>
  </div>
</body>
</html>
